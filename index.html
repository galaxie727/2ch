<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>チー娘スレ劇場 - ポストに、知らない手紙が入ってた</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:#0d0d10;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  -webkit-tap-highlight-color:transparent;
}
button,input,textarea,select{
  font:inherit;
}
[hidden]{
  display:none !important;
}

:root{
  --maxw:430px;
  --bg1:#121218;
  --bg2:#1b1b24;
  --panel:rgba(22,22,30,.88);
  --panel2:rgba(255,255,255,.06);
  --stroke:rgba(255,255,255,.12);
  --accent:#d8c3ff;
  --accent2:#8f7cff;
  --danger:#ff9aa9;
  --text2:rgba(255,255,255,.72);
  --shadow:0 10px 30px rgba(0,0,0,.34);
}

body{
  min-height:100svh;
  background:
    radial-gradient(circle at top, #222235 0%, #121218 36%, #0d0d10 100%);
}

.app{
  width:100%;
  max-width:var(--maxw);
  min-height:100svh;
  margin:0 auto;
  position:relative;
  overflow:hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)),
    linear-gradient(180deg, #161620 0%, #0d0d10 100%);
}

/* 背景演出 */
.bg{
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}
.bg::before,
.bg::after{
  content:"";
  position:absolute;
  inset:auto;
  border-radius:50%;
  filter:blur(42px);
  opacity:.18;
}
.bg::before{
  width:220px;height:220px;
  left:-50px;top:110px;
  background:#8e7dff;
}
.bg::after{
  width:180px;height:180px;
  right:-40px;top:340px;
  background:#ff7ea8;
}

/* 画面 */
.screen{
  min-height:100svh;
  display:flex;
  flex-direction:column;
  position:relative;
  z-index:2;
}

/* タイトル */
.top{
  padding:env(safe-area-inset-top) 18px 18px;
  min-height:100svh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.topHeader{
  padding-top:12px;
}
.kicker{
  font-size:12px;
  letter-spacing:.18em;
  color:var(--text2);
  margin-bottom:10px;
}
.title{
  font-size:31px;
  line-height:1.28;
  font-weight:800;
  letter-spacing:.03em;
  text-shadow:0 4px 16px rgba(0,0,0,.35);
}
.subtitle{
  margin-top:10px;
  font-size:13px;
  color:var(--text2);
  line-height:1.7;
}

.hero{
  position:relative;
  height:42svh;
  min-height:280px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}
.heroGlow{
  position:absolute;
  width:78%;
  height:72%;
  bottom:24px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(216,195,255,.22), rgba(216,195,255,0) 68%);
  filter:blur(10px);
}
.heroGirl{
  position:relative;
  width:100%;
  height:100%;
  background:url("girl.png") center bottom / contain no-repeat;
  animation:floaty 5.8s ease-in-out infinite alternate;
}
@keyframes floaty{
  from{ transform:translateY(0) scale(1); }
  to{ transform:translateY(-6px) scale(1.015); }
}

.topCard{
  margin-top:14px;
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:22px;
  padding:16px 16px 14px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}
.topStory{
  font-size:14px;
  line-height:1.8;
  color:#f0eef8;
}
.topButtons{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.btn{
  width:100%;
  border:none;
  border-radius:16px;
  padding:15px 16px;
  font-weight:700;
  color:#fff;
  background:linear-gradient(180deg, #6b58ff 0%, #4f40d9 100%);
  box-shadow:0 10px 24px rgba(79,64,217,.3);
}
.btn:active{
  transform:scale(.985);
}
.btnSub{
  background:rgba(255,255,255,.08);
  color:#fff;
  border:1px solid var(--stroke);
  box-shadow:none;
}

/* プレイ画面 */
.play{
  min-height:100svh;
  display:flex;
  flex-direction:column;
  padding-top:env(safe-area-inset-top);
}

.statusBar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 14px 8px;
}
.smallBtn{
  border:none;
  border-radius:12px;
  padding:10px 12px;
  background:rgba(255,255,255,.08);
  color:#fff;
  font-size:13px;
  border:1px solid var(--stroke);
}
.storyLabel{
  font-size:12px;
  color:var(--text2);
  letter-spacing:.08em;
}

.scene{
  position:relative;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:0;
}

.charArea{
  position:relative;
  height:41svh;
  min-height:250px;
  overflow:hidden;
}
.charAura{
  position:absolute;
  inset:auto 50% 18px;
  transform:translateX(-50%);
  width:74%;
  height:66%;
  border-radius:50%;
  background:radial-gradient(circle, rgba(216,195,255,.20), rgba(216,195,255,0) 70%);
  filter:blur(14px);
}
.char{
  position:absolute;
  inset:0;
  background:url("girl.png") center bottom / contain no-repeat;
  transform-origin:center bottom;
  transition:filter .25s ease, transform .25s ease, opacity .25s ease;
}
.char.normal{ filter:saturate(1) brightness(1); }
.char.worried{ filter:saturate(.92) brightness(.95); transform:scale(1.01); }
.char.serious{ filter:saturate(.82) brightness(.88); transform:scale(1.01); }
.char.soft{ filter:saturate(1.04) brightness(1.02); transform:scale(1.012); }

.letterFx{
  position:absolute;
  right:18px;
  top:22px;
  width:82px;
  height:58px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.18);
  background:
    linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04)),
    linear-gradient(135deg, #4a4459, #23222b);
  box-shadow:0 10px 26px rgba(0,0,0,.28);
  opacity:.95;
}
.letterFx::before{
  content:"";
  position:absolute;
  left:12px;right:12px;top:18px;height:1px;
  background:rgba(255,255,255,.35);
  box-shadow:0 8px 0 rgba(255,255,255,.18), 0 16px 0 rgba(255,255,255,.11);
}
.letterFx::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(145deg, transparent 49%, rgba(255,255,255,.12) 50%, transparent 51%);
  border-radius:10px;
  opacity:.75;
}

.uiZone{
  padding:0 12px calc(env(safe-area-inset-bottom) + 12px);
}
.nameTag{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(255,255,255,.08);
  border:1px solid var(--stroke);
  border-radius:999px;
  padding:8px 12px;
  font-size:12px;
  color:#f6f4ff;
  margin-bottom:10px;
  box-shadow:var(--shadow);
}
.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 12px rgba(216,195,255,.7);
}

.textBox{
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:22px;
  padding:16px 15px 14px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}
.text{
  min-height:108px;
  font-size:18px;
  line-height:1.75;
  white-space:pre-wrap;
}
.controls{
  display:flex;
  gap:8px;
  margin-top:12px;
}
.ctrl{
  flex:1;
  border:none;
  border-radius:13px;
  padding:12px 10px;
  background:rgba(255,255,255,.07);
  color:#fff;
  border:1px solid var(--stroke);
  font-size:14px;
}

.choices{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:12px;
}
.choice{
  width:100%;
  text-align:left;
  border:none;
  border-radius:16px;
  padding:15px 14px;
  background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
  color:#fff;
  border:1px solid var(--stroke);
  box-shadow:0 8px 20px rgba(0,0,0,.18);
  line-height:1.5;
}
.choice:active{
  transform:scale(.985);
}

.hint{
  margin-top:10px;
  text-align:center;
  font-size:12px;
  color:var(--text2);
}

/* 終了画面 */
.result{
  min-height:100svh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px);
}
.resultCard{
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:24px;
  padding:20px 18px 18px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}
.endLabel{
  font-size:12px;
  letter-spacing:.18em;
  color:var(--text2);
}
.endTitle{
  margin-top:8px;
  font-size:30px;
  font-weight:800;
}
.endText{
  margin-top:14px;
  font-size:16px;
  line-height:1.85;
  color:#f7f6ff;
  white-space:pre-wrap;
}
.resultButtons{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:16px;
}

/* カットイン */
.cutIn{
  position:fixed;
  inset:0;
  z-index:50;
  background:rgba(0,0,0,.96);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  opacity:0;
  pointer-events:none;
  transition:opacity .18s ease;
}
.cutIn.show{
  opacity:1;
  pointer-events:auto;
}
.cutInInner{
  width:min(100%, 540px);
  height:min(86svh, 760px);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.cutInImg{
  width:100%;
  height:100%;
  object-fit:contain;
  border-radius:8px;
  box-shadow:0 0 0 1px rgba(255,255,255,.12), 0 20px 80px rgba(0,0,0,.6);
  animation:cutInPop .22s ease;
  background:#111;
}
@keyframes cutInPop{
  from{ transform:scale(1.05); opacity:.4; }
  to{ transform:scale(1); opacity:1; }
}
.cutInCaption{
  position:absolute;
  left:0; right:0; bottom:-6px;
  text-align:center;
  font-size:12px;
  color:rgba(255,255,255,.72);
}

.flash{
  animation:flashBg .16s linear 1;
}
@keyframes flashBg{
  0%{ filter:brightness(1); }
  50%{ filter:brightness(1.25); }
  100%{ filter:brightness(1); }
}

@media (max-width:380px){
  .title{font-size:28px}
  .text{font-size:17px;min-height:100px}
}
</style>
</head>
<body>
<div class="app" id="appRoot">
  <div class="bg"></div>

  <!-- タイトル -->
  <section id="screenTop" class="screen top">
    <div class="topHeader">
      <div class="kicker">CHI-MUSUME THREAD STORY</div>
      <div class="title">ポストに、<br>知らない手紙が入ってた</div>
      <div class="subtitle">
        チー娘が語る、短編スレ劇場。<br>
        今日は少しだけ、不気味な話。
      </div>
    </div>

    <div class="hero">
      <div class="heroGlow"></div>
      <div class="heroGirl"></div>
    </div>

    <div class="topCard">
      <div class="topStory">
        今日、ポストの中に見覚えのない手紙が入っていた。<br>
        宛名も切手もない。ただ、誰かが直接入れたみたいで――。
      </div>
      <div class="topButtons">
        <button class="btn" id="startBtn">はじめる</button>
        <button class="btn btnSub" id="howBtn">あそびかた</button>
      </div>
    </div>
  </section>

  <!-- プレイ -->
  <section id="screenPlay" class="screen play" hidden>
    <div class="statusBar">
      <button class="smallBtn" id="backTitleBtn">タイトル</button>
      <div class="storyLabel">チー娘スレ劇場</div>
      <button class="smallBtn" id="resetBtn">最初から</button>
    </div>

    <div class="scene">
      <div class="charArea">
        <div class="charAura"></div>
        <div id="char" class="char normal"></div>
        <div class="letterFx"></div>
      </div>

      <div class="uiZone">
        <div class="nameTag"><span class="dot"></span><span id="speakerName">チー娘</span></div>

        <div class="textBox">
          <div id="text" class="text"></div>

          <div id="choices" class="choices"></div>

          <div id="controls" class="controls">
            <button id="nextBtn" class="ctrl">▶ 次へ</button>
          </div>

          <div id="hint" class="hint">タップで読み進めます</div>
        </div>
      </div>
    </div>
  </section>

  <!-- 結果 -->
  <section id="screenResult" class="screen result" hidden>
    <div class="resultCard">
      <div class="endLabel">ENDING</div>
      <div id="endTitle" class="endTitle">END</div>
      <div id="endText" class="endText"></div>

      <div class="resultButtons">
        <button id="playAgainBtn" class="btn">もう一度見る</button>
        <button id="toTitleBtn" class="btn btnSub">タイトルへ</button>
      </div>
    </div>
  </section>
</div>

<!-- 全画面カットイン -->
<div id="cutIn" class="cutIn" hidden>
  <div class="cutInInner">
    <img id="cutInImg" class="cutInImg" src="horror_art.png" alt="不気味な絵">
    <div class="cutInCaption">タップで戻る</div>
  </div>
</div>

<script>
const screenTop = document.getElementById('screenTop');
const screenPlay = document.getElementById('screenPlay');
const screenResult = document.getElementById('screenResult');

const startBtn = document.getElementById('startBtn');
const howBtn = document.getElementById('howBtn');
const backTitleBtn = document.getElementById('backTitleBtn');
const resetBtn = document.getElementById('resetBtn');
const playAgainBtn = document.getElementById('playAgainBtn');
const toTitleBtn = document.getElementById('toTitleBtn');

const textEl = document.getElementById('text');
const choicesEl = document.getElementById('choices');
const nextBtn = document.getElementById('nextBtn');
const controls = document.getElementById('controls');
const hint = document.getElementById('hint');
const charEl = document.getElementById('char');
const speakerName = document.getElementById('speakerName');
const appRoot = document.getElementById('appRoot');

const endTitle = document.getElementById('endTitle');
const endText = document.getElementById('endText');

const cutIn = document.getElementById('cutIn');

let step = 0;
let choice1 = null;
let choice2 = null;
let choice3 = null;
let ended = false;
let audioCtx = null;

function initAudio(){
  if(!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(AC) audioCtx = new AC();
  }
}

function tone(freq=540, duration=0.03, type='triangle', volume=0.018){
  if(!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + duration);
}

function pageSe(){
  tone(560, 0.03, 'triangle', 0.018);
}

function choiceSe(){
  tone(620, 0.05, 'triangle', 0.025);
}

function horrorSe(){
  if(!audioCtx) return;
  const now = audioCtx.currentTime;

  const osc1 = audioCtx.createOscillator();
  const gain1 = audioCtx.createGain();
  osc1.type = 'sawtooth';
  osc1.frequency.setValueAtTime(160, now);
  osc1.frequency.exponentialRampToValueAtTime(92, now + 0.22);
  gain1.gain.setValueAtTime(0.0001, now);
  gain1.gain.linearRampToValueAtTime(0.028, now + 0.02);
  gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);
  osc1.connect(gain1);
  gain1.connect(audioCtx.destination);
  osc1.start(now);
  osc1.stop(now + 0.24);

  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(1200, now);
  osc2.frequency.exponentialRampToValueAtTime(800, now + 0.08);
  gain2.gain.setValueAtTime(0.0001, now);
  gain2.gain.linearRampToValueAtTime(0.012, now + 0.01);
  gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  osc2.start(now);
  osc2.stop(now + 0.09);
}

function setScreen(name){
  screenTop.hidden = name !== 'top';
  screenPlay.hidden = name !== 'play';
  screenResult.hidden = name !== 'result';
}

function setMood(mood){
  charEl.className = 'char ' + mood;
}

function setText(name, text, mood='normal'){
  speakerName.textContent = name || 'チー娘';
  textEl.textContent = text;
  setMood(mood);
  choicesEl.innerHTML = '';
  controls.hidden = false;
  nextBtn.hidden = false;
  hint.hidden = false;
  pageSe();
}

function setChoices(arr){
  controls.hidden = true;
  hint.hidden = true;
  choicesEl.innerHTML = '';
  arr.forEach(item=>{
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = item.label;
    btn.onclick = ()=>{
      choiceSe();
      item.onClick();
    };
    choicesEl.appendChild(btn);
  });
}

function showHow(){
  alert(
`あそびかた

・「次へ」で読み進めます
・途中で選択肢が出ます
・選んだ内容で結末が変わります
・「絵を見る」を選ぶと全画面演出が入ります

必要画像
・girl.png
・horror_art.png`
  );
}

function resetStory(){
  initAudio();
  step = 0;
  choice1 = null;
  choice2 = null;
  choice3 = null;
  ended = false;
  setScreen('play');
  render();
}

function goTitle(){
  setScreen('top');
}

function showEnding(title, body){
  ended = true;
  endTitle.textContent = title;
  endText.textContent = body;
  setScreen('result');
}

function showCutIn(afterCallback){
  initAudio();
  horrorSe();
  appRoot.classList.add('flash');
  setTimeout(()=>appRoot.classList.remove('flash'), 180);

  cutIn.hidden = false;
  requestAnimationFrame(()=>cutIn.classList.add('show'));

  const close = ()=>{
    cutIn.classList.remove('show');
    setTimeout(()=>{
      cutIn.hidden = true;
      cutIn.removeEventListener('click', close);
      if(afterCallback) afterCallback();
    }, 180);
  };

  cutIn.addEventListener('click', close, { once:true });
}

function render(){
  if(ended) return;

  switch(step){

    case 0:
      setText('チー娘', 'ねえ…今日さ、変なもの入ってたの', 'worried');
      break;

    case 1:
      setText('チー娘', 'ポストに。', 'worried');
      break;

    case 2:
      setText('チー娘', '手紙。', 'serious');
      break;

    case 3:
      setText('チー娘', 'でもね。\n宛名、なかったの', 'serious');
      break;

    case 4:
      setText('チー娘', '切手もないし、誰かが直接入れたっぽい', 'worried');
      break;

    case 5:
      setText('チー娘', 'しかもさ。\n入ってたの、夜だったんだよね', 'serious');
      break;

    case 6:
      setText('チー娘', 'その日は雨も降ってないし、\n配達が来る時間でもなかったの', 'worried');
      break;

    case 7:
      setChoices([
        { label:'見せて', onClick:()=>{ choice1='show'; step=8; render(); } },
        { label:'やめとけ', onClick:()=>{ choice1='stop'; step=8; render(); } },
        { label:'それ怖くない？', onClick:()=>{ choice1='scary'; step=8; render(); } },
      ]);
      break;

    case 8:
      if(choice1 === 'show'){
        setText('チー娘', 'うん…いいけど', 'worried');
      }else if(choice1 === 'stop'){
        setText('チー娘', 'もう見ちゃった', 'serious');
      }else{
        setText('チー娘', '最初は思わなかった。\nでも今はちょっと怖い', 'worried');
      }
      break;

    case 9:
      setText('チー娘', '文章がね。\n途中で同じ言葉が何回も繰り返されてるの', 'serious');
      break;

    case 10:
      setText('チー娘', '意味もよく分からなくて。\n怒ってる感じだけは分かる', 'serious');
      break;

    case 11:
      setText('チー娘', 'しかも、途中から字の大きさが変わってて…\n後ろにいくほど、だんだん乱れてる', 'worried');
      break;

    case 12:
      setText('チー娘', 'あとね。\n紙に絵が描いてあったの', 'worried');
      break;

    case 13:
      setChoices([
        {
          label:'絵を見る',
          onClick:()=>{
            showCutIn(()=>{
              step = 14;
              render();
            });
          }
        },
        {
          label:'見ない方がいい',
          onClick:()=>{
            step = 14;
            render();
          }
        }
      ]);
      break;

    case 14:
      if(choice1 === 'show'){
        setText('チー娘', '……今のやつ', 'serious');
      }else{
        setText('チー娘', '普通の絵じゃないの。\n見た瞬間、ちょっと変な感じがして', 'serious');
      }
      break;

    case 15:
      setText('チー娘', 'なんていうか…\n“描いた”っていうより、置いていかれた感じ', 'serious');
      break;

    case 16:
      setText('チー娘', 'しかもね。\n紙、ちょっと湿ってた', 'worried');
      break;

    case 17:
      setText('チー娘', '雨、降ってないのに', 'serious');
      break;

    case 18:
      setText('チー娘', 'で、日付が書いてあったの', 'worried');
      break;

    case 19:
      setText('チー娘', '“昨日”って', 'serious');
      break;

    case 20:
      setText('チー娘', 'でもこれ、今日入ってたんだよね', 'serious');
      break;

    case 21:
      setChoices([
        { label:'子供のイタズラ？', onClick:()=>{ choice2='kid'; step=22; render(); } },
        { label:'それやばくない？', onClick:()=>{ choice2='danger'; step=22; render(); } },
        { label:'誰かのメッセージ？', onClick:()=>{ choice2='message'; step=22; render(); } },
      ]);
      break;

    case 22:
      if(choice2 === 'kid'){
        setText('チー娘', 'そう思いたい。\nでもね、線がすごい荒くて', 'worried');
      }else if(choice2 === 'danger'){
        setText('チー娘', 'うん。\nちょっと普通じゃない', 'serious');
      }else{
        setText('チー娘', 'それ思った。\n誰かに向けて書いてる感じ', 'serious');
      }
      break;

    case 23:
      setText('チー娘', 'でもね。\n名前、私じゃないの', 'serious');
      break;

    case 24:
      setText('チー娘', '全然知らない人の名前', 'serious');
      break;

    case 25:
      setText('チー娘', 'なのにさ。\nなんで、ここに入ってたんだろ', 'worried');
      break;

    case 26:
      setText('チー娘', 'それでさっき、ポストをもう一回見に行ったの', 'worried');
      break;

    case 27:
      setText('チー娘', 'そしたら、何も入ってなかった', 'soft');
      break;

    case 28:
      setText('チー娘', 'でも……', 'serious');
      break;

    case 29:
      setText('チー娘', '内側、濡れてたの', 'serious');
      break;

    case 30:
      setChoices([
        { label:'間違いでしょ', onClick:()=>{ choice3='mistake'; step=31; render(); } },
        { label:'誰か近くにいる', onClick:()=>{ choice3='near'; step=31; render(); } },
        { label:'捨てた方がいい', onClick:()=>{ choice3='trash'; step=31; render(); } },
      ]);
      break;

    case 31:
      if(choice3 === 'mistake'){
        setText('チー娘', 'そうだよね。\nただの間違いだよね', 'soft');
      }else if(choice3 === 'near'){
        setText('チー娘', '……それ。\nちょっと思った', 'serious');
      }else{
        setText('チー娘', 'うん、捨てた', 'serious');
      }
      break;

    case 32:
      if(choice3 === 'mistake'){
        showEnding(
          'END A',
          'でもさ。\nまた入ってたらどうしよ。\n\nチー娘\n「開かない方がよかったのかな…」'
        );
      }else if(choice3 === 'near'){
        showEnding(
          'END B',
          '誰か、この辺にいるのかな。\n“気づいてほしい”みたいな。\n\nチー娘\n「私のポストを選んだ理由、あるのかな…」'
        );
      }else{
        showEnding(
          'END C',
          'でもさ。\nさっきポスト見たら、また入ってた。\n\n同じやつ。\n\nチー娘\n「……捨てたはずなのに」'
        );
      }
      break;
  }
}

function nextStep(){
  if(ended) return;
  if(step === 7 || step === 13 || step === 21 || step === 30) return;
  step++;
  render();
}

startBtn.addEventListener('click', ()=>{
  initAudio();
  if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  resetStory();
});
howBtn.addEventListener('click', showHow);
backTitleBtn.addEventListener('click', goTitle);
resetBtn.addEventListener('click', resetStory);
playAgainBtn.addEventListener('click', resetStory);
toTitleBtn.addEventListener('click', goTitle);
nextBtn.addEventListener('click', nextStep);

render();
setScreen('top');
</script>
</body>
</html>
