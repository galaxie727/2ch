<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>チー娘スレ劇場</title>

<style>
body{
  margin:0;
  background:#0d0d10;
  color:#fff;
  font-family:sans-serif;
}
.app{
  max-width:420px;
  margin:auto;
}

/* キャラ */
.char{
  height:40vh;
  background:url("girl.png") center/contain no-repeat;
  opacity:.95;
  transition:.3s;
}

/* テキスト */
.box{
  padding:16px;
}
.text{
  font-size:18px;
  min-height:100px;
  line-height:1.7;
  transition:.3s;
}

/* 演出 */
.fade{
  opacity:.3;
}

/* ボタン */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#333;
  color:#fff;
}

/* タイトル */
.menu{
  padding:20px;
}
.title{
  font-size:26px;
  margin-bottom:20px;
}
</style>
</head>

<body>
<div class="app">

<!-- タイトル -->
<div id="menu" class="menu">
  <div class="title">チー娘スレ劇場</div>
  <button onclick="startStory(1)">ホラー：手紙</button>
  <button onclick="startStory(2)">恋愛：スマホ</button>
  <button onclick="startStory(3)">ほのぼの：電話</button>
</div>

<!-- ゲーム -->
<div id="game" style="display:none;">
  <div id="char" class="char"></div>
  <div class="box">
    <div id="text" class="text"></div>
    <div id="choices"></div>
    <button id="next" onclick="next()">▶ 次へ</button>
  </div>
</div>

</div>

<script>

// 音
const se = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6c4d.mp3");

// 状態
let step=0,story=1,route={};

function playSE(){
  se.currentTime=0;
  se.play();
}

function startStory(n){
  story=n;
  step=0;
  route={};
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  next();
}

function setText(t){
  const el=document.getElementById("text");
  el.classList.add("fade");
  setTimeout(()=>{
    el.innerText=t;
    el.classList.remove("fade");
  },100);
  playSE();
  document.getElementById("choices").innerHTML="";
}

function setChoices(arr){
  const c=document.getElementById("choices");
  c.innerHTML="";
  document.getElementById("next").style.display="none";
  arr.forEach(a=>{
    const b=document.createElement("button");
    b.innerText=a.label;
    b.onclick=()=>{
      document.getElementById("next").style.display="block";
      a.onClick();
    };
    c.appendChild(b);
  });
}

function next(){
  step++;

  // ===== ホラー =====
  if(story===1){

    switch(step){

      case 1: setText("ねえ…今日さ、変なもの入ってたの"); break;
      case 2: setText("ポストに手紙"); break;
      case 3: setText("宛名も切手もないの"); break;
      case 4: setText("しかも中、ちょっとおかしい"); break;

      case 5:
        setChoices([
          {label:"見せて",onClick:()=>{}},
          {label:"怖くない？",onClick:()=>{}}
        ]);
        return;

      case 6: setText("同じ言葉が何回も書いてあるの"); break;
      case 7: setText("怒ってる感じ"); break;

      // ★追加：怖さ強化
      case 8: setText("ねえ…日付書いてあった"); break;
      case 9: setText("“昨日”って"); break;
      case 10: setText("でも今日入ってたんだよね"); break;

      case 11: setText("あとね…紙、湿ってた"); break;
      case 12: setText("雨降ってないのに"); break;

      case 13:
        setChoices([
          {label:"捨てる",onClick:()=>route.end="A"},
          {label:"様子見る",onClick:()=>route.end="B"}
        ]);
        return;

      case 14:
        if(route.end==="A"){
          setText("捨てたのに、また入ってた");
        }else{
          setText("次の日も入ってた");
        }
        break;

      case 15:
        setText("同じやつ");
        break;

      case 16:
        setText("END");
        break;
    }
  }

  // ===== 恋愛 =====
  if(story===2){
    switch(step){
      case 1:setText("彼氏のスマホ見ちゃった");break;
      case 2:setText("ハートついてた");break;
      case 3:setText("女だった");break;
      case 4:setText("でも母親だった");break;
      case 5:setText("なんか違う意味で怖い");break;
      case 6:setText("END");break;
    }
  }

  // ===== ほのぼの =====
  if(story===3){
    switch(step){
      case 1:setText("毎週同じ時間に電話が来る");break;
      case 2:setText("知らない番号");break;
      case 3:setText("出てみた");break;
      case 4:setText("おばあちゃんだった");break;
      case 5:setText("ちょっと安心した");break;
      case 6:setText("END");break;
    }
  }
}

</script>
</body>
</html>
