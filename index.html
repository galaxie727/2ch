<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>チー娘スレ劇場</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:#fff;
  background:linear-gradient(180deg,#1a1a2e,#0d0d10);
}

/* タイトル */
.menu{
  padding:20px;
  text-align:center;
}
.title{
  font-size:28px;
  margin-bottom:20px;
}

/* キャラ選択 */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:14px;
  margin:10px 0;
  border:1px solid rgba(255,255,255,0.1);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  background:linear-gradient(45deg,#6b5cff,#8f7cff);
  color:#fff;
  font-size:16px;
}

/* ゲーム */
.game{
  display:none;
}

.char{
  height:40vh;
  background:url("girl.png") center/contain no-repeat;
}

.textbox{
  background:rgba(0,0,0,0.5);
  padding:16px;
  border-radius:16px;
  margin:10px;
}

.text{
  font-size:18px;
  min-height:100px;
  line-height:1.6;
}

.fade{
  opacity:.2;
  transition:.2s;
}

</style>
</head>

<body>

<!-- タイトル -->
<div id="menu" class="menu">
  <div class="title">チー娘スレ劇場</div>

  <div class="card">
    👻 ミナ（ホラー）
    <button onclick="start('horror')">はじめる</button>
  </div>

  <div class="card">
    💕 ユイ（恋愛）
    <button onclick="start('love')">はじめる</button>
  </div>

  <div class="card">
    🌿 サキ（ほのぼの）
    <button onclick="start('daily')">はじめる</button>
  </div>

  <div class="card">
    😂 ナナ（笑い）
    <button onclick="start('fun')">はじめる</button>
  </div>
</div>

<!-- ゲーム -->
<div id="game" class="game">
  <div class="char"></div>

  <div class="textbox">
    <div id="text" class="text"></div>
    <div id="choices"></div>
    <button onclick="next()">▶ 次へ</button>
  </div>

  <button onclick="back()">← 戻る</button>
</div>

<script>

// 音
const se = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6c4d.mp3");

// 状態
let type="";
let step=0;

function start(t){
  type=t;
  step=0;
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  next();
}

function back(){
  location.reload();
}

function setText(t){
  const el=document.getElementById("text");
  el.classList.add("fade");
  setTimeout(()=>{
    el.innerText=t;
    el.classList.remove("fade");
  },100);
  se.currentTime=0;
  se.play();
}

function next(){
  step++;

  // ホラー
  if(type==="horror"){
    const s=[
      "ねえ…今日さ、変なもの入ってたの",
      "ポストに手紙",
      "宛名もない",
      "中、ちょっとおかしい",
      "同じ言葉が繰り返されてる",
      "ねえ…日付が“昨日”なの",
      "でも今日入ってた",
      "紙、濡れてた",
      "雨降ってないのに",
      "また入ってた",
      "END"
    ];
    setText(s[step-1]||"END");
  }

  // 恋愛
  if(type==="love"){
    const s=[
      "ねえ聞いて！！",
      "彼氏のスマホ見ちゃった",
      "ハートついてた",
      "女だった",
      "…母親だった",
      "なんか違う意味で怖い",
      "END"
    ];
    setText(s[step-1]||"END");
  }

  // 日常
  if(type==="daily"){
    const s=[
      "毎週同じ時間に電話が来る",
      "知らない番号",
      "出てみた",
      "おばあちゃんだった",
      "ちょっと安心した",
      "END"
    ];
    setText(s[step-1]||"END");
  }

  // 笑い
  if(type==="fun"){
    const s=[
      "彼氏が浮気してると思った",
      "証拠集めた",
      "問い詰めた",
      "全部勘違いだった",
      "めちゃくちゃ気まずい",
      "END"
    ];
    setText(s[step-1]||"END");
  }
}

</script>

</body>
</html>
